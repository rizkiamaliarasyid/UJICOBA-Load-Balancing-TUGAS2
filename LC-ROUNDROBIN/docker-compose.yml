services:
  nginx-lb:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-1
      - web-2
      - web-3

  web-1:
    image: python:3.9-slim
    container_name: web-1
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install flask && python app.py"

  web-2:
    image: python:3.9-slim
    container_name: web-2
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install flask && python app.py"

  web-3:
    image: python:3.9-slim
    container_name: web-3
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "pip install flask && python app.py"


    